<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Avisos e Tarefas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }

    input {
      padding: 8px;
      width: 250px;
    }

    button {
      padding: 8px 12px;
      margin-left: 5px;
      cursor: pointer;
    }

    ul {
      margin-top: 15px;
    }

    p {
      font-weight: bold;
      color: blue;
    }
  </style>
</head>

<body>

  <h1>Sistema Escolar</h1>

  <h2>Nome do Aluno</h2>

  <input type="text" id="nome" placeholder="Digite o nome do aluno">
  <button id="mostrarNome">Mostrar Nome</button>

  <p id="resultado"></p>

  <hr>

  <h2>Lista de Tarefas / Avisos</h2>

  <input type="text" id="texto" placeholder="Digite uma tarefa ou aviso">
  <button id="adicionar">Adicionar</button>

  <ul id="lista"></ul>

  <script>

    document.getElementById("mostrarNome").addEventListener("click", function () {

      const nome = document.getElementById("nome").value.trim();

      if (nome === "") {
        alert("Digite o nome do aluno.");
        return;
      }

      alert("Botão clicado com sucesso!");

      document.getElementById("resultado").textContent =
        "Aluno: " + nome;
    });

    document.getElementById("adicionar").addEventListener("click", function () {

      const texto = document.getElementById("texto").value.trim();

      if (texto === "") {
        alert("Digite uma tarefa ou aviso.");
        return;
      }

      const item = document.createElement("li");
      item.textContent = texto;

      document.getElementById("lista").appendChild(item);

      document.getElementById("texto").value = "";
      document.getElementById("texto").focus();

    });

  </script>

</body>
</html>
