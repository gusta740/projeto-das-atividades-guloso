<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Escolar</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #222;
      color: white;
      padding: 15px 20px;
    }

    .topo button {
      background-color: #2b6cb0;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 5px;
    }

    .topo button:hover {
      background-color: #245a92;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .menu {
      width: 220px;
      background-color: #333;
      padding: 20px;
    }

    .menu a {
      display: block;
      color: white;
      text-decoration: none;
      margin-bottom: 15px;
    }

    .menu a:hover {
      color: #66b3ff;
    }

    .conteudo {
      flex: 1;
      padding: 20px;
    }

    .menu-horizontal {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .menu-horizontal a {
      text-decoration: none;
      color: #2b6cb0;
      font-weight: bold;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .card {
      flex: 1 1 220px;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-top: 0;
    }
  </style>
</head>

<body>

  <div class="topo">
    <h2>Sistema Escolar</h2>
    <button>Sair</button>
  </div>

  <div class="container">

    <div class="menu">
      <a href="#">Início</a>
      <a href="#">Avisos</a>
      <a href="#">Tarefas</a>
    </div>

    <div class="conteudo">

      <div class="menu-horizontal">
        <a href="#">Início</a>
        <a href="#">Avisos</a>
        <a href="#">Contato</a>
      </div>

      <div class="cards">

        <div class="card">
          <h3>Avisos</h3>
          <p>3 avisos publicados.</p>
        </div>

        <div class="card">
          <h3>Tarefas</h3>
          <p>5 tarefas pendentes.</p>
        </div>

        <div class="card">
          <h3>Reservas</h3>
          <p>2 espaços reservados.</p>
        </div>

        <div class="card">
          <h3>Eventos</h3>
          <p>Próxima reunião na sexta-feira.</p>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
